services:
  - type: web
    name: lakshya-api
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: node src/server.js
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
